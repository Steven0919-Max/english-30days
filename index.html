<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI英语学习 Pro++</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f8}
header{background:#111;color:#fff;padding:14px;text-align:center}
.card{background:#fff;margin:10px;padding:12px;border-radius:12px}
.item{padding:6px 0;cursor:pointer;color:#1a73e8}
.opt{display:block;padding:8px;margin:5px;background:#eee;border-radius:8px;cursor:pointer}
.good{background:#c8f7c5}
.bad{background:#ffd6d6}
</style>
</head>

<body>

<header>📱 AI英语学习 Pro++</header>

<div class="card">
<h3>📅 Day <span id="day"></span></h3>
</div>

<!-- 高频词 -->
<div class="card">
<h3>📚 高频词汇</h3>
<div id="words"></div>
</div>

<!-- 口语短句 -->
<div class="card">
<h3>💬 日常口语短句</h3>
<div id="phrases"></div>
</div>

<!-- 练习 -->
<div class="card">
<h3>🧠 今日练习</h3>
<div id="quiz"></div>
</div>

<!-- 错题 -->
<div class="card">
<h3>🔁 错题本</h3>
<div id="wrong"></div>
</div>

<script>

/////////////////////////////////////////////////////
// 📅 Day系统
/////////////////////////////////////////////////////
let start = localStorage.getItem("startDay");
if(!start){
start = Date.now();
localStorage.setItem("startDay",start);
}

let day = Math.floor((Date.now()-start)/86400000)+1;
document.getElementById("day").innerText = day;

/////////////////////////////////////////////////////
// 📚 高频词汇（核心200词精简版）
/////////////////////////////////////////////////////
const words=[
["hello","你好"],["thank","感谢"],["want","想要"],["go","去"],
["eat","吃"],["drink","喝"],["like","喜欢"],["home","家"],
["school","学校"],["water","水"],["food","食物"],["time","时间"]
];

let wbox=document.getElementById("words");
words.forEach(w=>{
let div=document.createElement("div");
div.className="item";
div.innerText=w[0]+" = "+w[1];
div.onclick=()=>speak(w[0]);
wbox.appendChild(div);
});

/////////////////////////////////////////////////////
// 💬 日常口语短句
/////////////////////////////////////////////////////
const phrases=[
"I want water",
"I am hungry",
"Where is the toilet?",
"How much is it?",
"I don't understand",
"Can you help me?",
"Nice to meet you",
"See you later"
];

let pbox=document.getElementById("phrases");
phrases.forEach(p=>{
let div=document.createElement("div");
div.className="item";
div.innerText=p;
div.onclick=()=>speak(p);
pbox.appendChild(div);
});

/////////////////////////////////////////////////////
// 🔊 语音
/////////////////////////////////////////////////////
function speak(t){
let u=new SpeechSynthesisUtterance(t);
u.lang="en-US";
u.rate=0.9;
speechSynthesis.cancel();
speechSynthesis.speak(u);
}

/////////////////////////////////////////////////////
// 🧠 练习题
/////////////////////////////////////////////////////
const base=[
{q:"I ___ water",a:"want",opts:["want","go","eat"]},
{q:"I ___ hungry",a:"am",opts:["am","is","are"]},
{q:"Where ___ you go?",a:"do",opts:["do","does","did"]}
];

let wrongs=JSON.parse(localStorage.getItem("wrongs")||"[]");

let quiz=[...base,...wrongs.slice(-5)];

let qbox=document.getElementById("quiz");

quiz.forEach(item=>{
let div=document.createElement("div");
div.innerHTML="<b>"+item.q+"</b>";

item.opts.forEach(opt=>{
let b=document.createElement("div");
b.className="opt";
b.innerText=opt;

b.onclick=()=>{
if(opt===item.a){
b.classList.add("good");
}else{
b.classList.add("bad");
wrongs.push(item);
localStorage.setItem("wrongs",JSON.stringify(wrongs));
renderWrong();
}
};
div.appendChild(b);
});

qbox.appendChild(div);
});

/////////////////////////////////////////////////////
// 🔁 错题本
/////////////////////////////////////////////////////
function renderWrong(){
let box=document.getElementById("wrong");
box.innerHTML="";
wrongs.slice(-10).forEach(w=>{
let d=document.createElement("div");
d.innerText="🔁 "+w.q;
box.appendChild(d);
});
}
renderWrong();

</script>

</body>
</html>
