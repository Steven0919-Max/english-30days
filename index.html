<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>睡前英语30天系统</title>

<style>
body { font-family: Arial; background:#f6f6f6; padding:15px; }
h2 { text-align:center; }
.card { background:#fff; padding:15px; margin:10px 0; border-radius:12px; }
.small { color:#666; font-size:13px; text-align:center; }
</style>
</head>

<body>

<h2>🌙 睡前英语自动系统</h2>

<div class="small" id="date"></div>

<div class="card">
<h3>📘 当前天数：Day <span id="day"></span></h3>
</div>

<div class="card">
<h3>🟡 单词</h3>
<div id="words"></div>
</div>

<div class="card">
<h3>🔵 句子</h3>
<div id="sentences"></div>
</div>

<div class="card">
<h3>🟣 中文 → 英文</h3>
<div id="translate"></div>
</div>

<script>
// 今天日期
const today = new Date();
document.getElementById("date").innerText = today.toDateString();

// 计算 Day（从服务器时间或本地）
const startDate = new Date("2026-01-01"); // 起始学习日
const diff = Math.floor((today - startDate) / (1000*60*60*24)) + 1;
const day = ((diff - 1) % 30) + 1;

document.getElementById("day").innerText = day;

// 30天词库（示例版，你后面可以扩展）
const data = {
1: {
words: ["want = 想要", "water = 水", "food = 食物"],
sentences: ["I want water", "I like food"],
translate: "我想要水 = I want water"
},
2: {
words: ["go = 去", "come = 来", "see = 看"],
sentences: ["I go home", "Come here"],
translate: "我回家 = I go home"
}
};

// 默认
let d = data[day] || data[1];

// 输出
document.getElementById("words").innerHTML = d.words.join("<br>");
document.getElementById("sentences").innerHTML = d.sentences.join("<br>");
document.getElementById("translate").innerText = d.translate;
</script>

</body>
</html>
