<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI英语学习 V7</title>

<style>
body{font-family:Arial;background:#f6f6f6;margin:0}
h2{text-align:center}
.card{background:#fff;margin:12px;padding:16px;border-radius:12px}
.word{padding:12px;background:#eee;margin:6px 0;border-radius:10px;font-size:18px}
.btn{width:92%;padding:16px;font-size:18px;margin:10px auto;display:block;background:#22c55e;color:#fff;border:none;border-radius:14px}
.option{padding:12px;background:#eee;margin:8px;border-radius:10px}
.bottom{position:fixed;bottom:0;width:100%;background:#fff;display:flex;justify-content:space-around;padding:10px;font-size:14px}
.small{color:#666;font-size:13px;text-align:center}
</style>
</head>

<body>

<h2>📘 AI英语学习 V7（AI老师版）</h2>

<div class="card">
<h3>📅 Day <span id="day"></span> ｜ 🔥 连续 <span id="streak">0</span> 天</h3>
</div>

<div class="card">
<h3>📚 今日单词（点击发音）</h3>
<div id="words"></div>
</div>

<div class="card">
<h3>💬 今日句子（AI生成）</h3>
<div id="sentences"></div>
</div>

<div class="card">
<h3>🧠 练习（错题会重复）</h3>
<p id="q"></p>
<div id="options"></div>
<p id="result"></p>
</div>

<button class="btn" onclick="nextQ()">下一题</button>

<div class="card">
<h3>🤖 AI英语老师</h3>
<input id="ask" placeholder="输入：帮我练口语 / 造句" style="width:95%;padding:10px">
<button class="btn" onclick="ai()">发送</button>
<p id="ai"></p>
</div>

<div class="bottom">
<div>🏠首页</div>
<div>📘学习</div>
<div>🧠练习</div>
</div>

<script>

// ===== 基础词库 =====
const vocab = [
["like","喜欢"],["go","去"],["eat","吃"],["drink","喝"],["water","水"],
["want","想要"],["need","需要"],["see","看见"],["have","有"],["play","玩"],
["study","学习"],["read","读"],["write","写"],["run","跑"]
];

// ===== AI句型系统 =====
function makeSentence(word){
let templates = [
"I like to {w}",
"I want to {w}",
"I need to {w}",
"I can {w}",
"I will {w} today"
];
let t = templates[Math.floor(Math.random()*templates.length)];
return t.replace("{w}",word);
}

// ===== 稳定每日种子 =====
function seed(){
let d=new Date();
return d.getFullYear()*100+(d.getMonth()+1)*10+d.getDate();
}

// ===== 今日数据 =====
function today(){
let s=seed();
let words=[];
for(let i=0;i<5;i++){
words.push(vocab[(s+i)%vocab.length]);
}

let sentences=[];
for(let i=0;i<2;i++){
sentences.push(makeSentence(words[i][0]));
}

return {words,sentences};
}

let data=today();

// ===== 渲染 =====
document.getElementById("day").innerText=new Date().getDate();

let streak = localStorage.getItem("streak")||0;
document.getElementById("streak").innerText=streak;

// 单词
document.getElementById("words").innerHTML=
data.words.map(w=>`
<div class='word' onclick='speak("${w[0]}")'>
🔊 ${w[0]} = ${w[1]}
</div>`).join("");

// 句子
document.getElementById("sentences").innerHTML=
data.sentences.map(s=>`<div class='word'>${s}</div>`).join("");

// ===== 语音 =====
function speak(text){
let u=new SpeechSynthesisUtterance(text);
u.lang="en-US";
speechSynthesis.speak(u);
}

// ===== 练习系统 =====
let i=0;

function nextQ(){
let w=data.words[i%5];
let correct=w[1];

let opts=shuffle([correct,"水","吃","玩"]);

document.getElementById("q").innerText="“"+w[0]+"”是什么意思？";

document.getElementById("options").innerHTML=
opts.map(o=>`
<div class='option' onclick='check("${o}","${correct}")'>${o}</div>
`).join("");

document.getElementById("result").innerText="";
}

function check(a,c){
if(a===c){
document.getElementById("result").innerText="✅ 正确";

// 打卡
let s=parseInt(localStorage.getItem("streak")||0);
localStorage.setItem("streak",s+1);

}else{
document.getElementById("result").innerText="❌ 错误 → 正确："+c;
}
}

function shuffle(a){
return a.sort(()=>Math.random()-0.5);
}

// ===== AI老师（简化版）=====
function ai(){
let v=document.getElementById("ask").value;

let res="";
if(v.includes("口语")){
res="Let's practice: I want to go. / I like water. Try repeating!";
}
else if(v.includes("造句")){
res="Try: I like " + data.words[0][0];
}
else{
res="我可以帮你练口语、造句、背单词。";
}

document.getElementById("ai").innerText=res;
}

nextQ();

</script>

</body>
</html>
