<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>轻量英语App</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f8}
header{padding:15px;text-align:center;background:#111;color:#fff}
.tab{display:flex;justify-content:space-around;background:#fff;padding:10px}
.tab button{border:none;background:none;font-size:14px}
.page{display:none;padding:15px}
.active{display:block}
.card{background:#fff;padding:12px;margin:10px 0;border-radius:10px}
.word{padding:5px 0;cursor:pointer;color:#1a73e8}
.small{font-size:12px;color:#666}
</style>
</head>

<body>

<header>
<h2>📱 轻量英语App</h2>
<div class="small">Lite English Learning System</div>
</header>

<div class="tab">
<button onclick="show('home')">🏠 首页</button>
<button onclick="show('study')">📚 学习</button>
<button onclick="show('review')">🧠 复习</button>
<button onclick="show('me')">📊 我的</button>
</div>

<!-- 首页 -->
<div id="home" class="page active">
<div class="card">
<h3>📅 Day <span id="day"></span></h3>
<div id="date"></div>
</div>

<div class="card">
<h3>🔥 今日状态</h3>
<div id="status"></div>
</div>
</div>

<!-- 学习 -->
<div id="study" class="page">
<div class="card">
<h3>📚 单词学习</h3>
<div id="words"></div>
</div>

<div class="card">
<h3>📝 例句</h3>
<div id="sentences"></div>
</div>
</div>

<!-- 复习 -->
<div id="review" class="page">
<div class="card">
<h3>🧠 复习区</h3>
<div id="reviewBox"></div>
</div>
</div>

<!-- 我的 -->
<div id="me" class="page">
<div class="card">
<h3>📊 学习数据</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>📌 打卡</h3>
<button onclick="checkin()">今日打卡</button>
<div id="check"></div>
</div>
</div>

<script>

// ================= 数据 =================
const words = [
{en:"want",cn:"想要"},
{en:"water",cn:"水"},
{en:"food",cn:"食物"},
{en:"go",cn:"去"},
{en:"like",cn:"喜欢"}
];

const sentences = [
"I want water",
"I like food",
"Can I go home?"
];

// ================= 日期 =================
let start = localStorage.getItem("start") || new Date().toISOString();
localStorage.setItem("start", start);

let now = new Date();
let day = Math.floor((now - new Date(start))/86400000)+1;

document.getElementById("day").innerText = day;
document.getElementById("date").innerText = now.toDateString();

// ================= 学习区 =================
let box = document.getElementById("words");

words.forEach(w=>{
let div=document.createElement("div");
div.className="word";
div.innerHTML=`🔊 ${w.en} = ${w.cn}`;
div.onclick=()=>speak(w.en);
box.appendChild(div);
});

document.getElementById("sentences").innerHTML =
sentences.map(s=>`📝 ${s}`).join("<br>");

// ================= 语音 =================
function speak(t){
let u=new SpeechSynthesisUtterance(t);
u.lang="en-US";
speechSynthesis.speak(u);
}

// ================= 复习系统 =================
let reviewData = JSON.parse(localStorage.getItem("reviewData")||"{}");

let reviewList = [];

words.forEach(w=>{
let last = reviewData[w.en];
if(!last || [1,2,4,7,15].includes(day-last)){
reviewList.push(w.en);
reviewData[w.en]=day;
}
});

localStorage.setItem("reviewData",JSON.stringify(reviewData));

document.getElementById("reviewBox").innerHTML =
reviewList.map(w=>"🔁 "+w).join("<br>");

// ================= 打卡 =================
function checkin(){
let logs=JSON.parse(localStorage.getItem("logs")||"[]");
let today=new Date().toDateString();
if(!logs.includes(today)) logs.push(today);
localStorage.setItem("logs",JSON.stringify(logs));
showLogs(logs);
}

function showLogs(logs){
document.getElementById("check").innerHTML =
"已打卡：" + logs.length + " 天";
}

showLogs(JSON.parse(localStorage.getItem("logs")||"[]"));

// ================= 状态 =================
document.getElementById("status").innerHTML =
"今日学习单词：" + words.length + "<br>" +
"今日例句：" + sentences.length;

// ================= 统计 =================
document.getElementById("stats").innerHTML =
"系统运行正常 ✔<br>学习中...";

function show(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

</script>

</body>
</html>
