<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>睡前英语30天</title>

<style>
body { font-family: Arial; background:#f6f6f6; padding:15px; }
h2 { text-align:center; }
.card { background:#fff; padding:15px; margin:10px 0; border-radius:12px; }
</style>
</head>

<body>

<h2>🌙 睡前英语 Day 1</h2>

<div class="card">
<h3>🟡 单词</h3>
<p>want = 想要</p>
<p>water = 水</p>
<p>food = 食物</p>
<p>go = 去</p>
<p>like = 喜欢</p>
</div>

<div class="card">
<h3>🔵 句子</h3>
<p>I want water</p>
<p>I like food</p>
<p>Can I go?</p>
</div>

<div class="card">
<h3>🟣 中文 → 英文</h3>
<p>我想要水</p>
<p><b>I want water</b></p>
</div>

</body>
</html>
