<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI英语学习 V4 免费增强版</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f8;text-align:center}
header{background:#111;color:#fff;padding:14px}
.card{background:#fff;margin:10px;padding:12px;border-radius:12px}
.item{padding:8px;margin:6px;background:#eee;border-radius:10px;cursor:pointer}
.good{background:#b6f7b0}
.bad{background:#ffb3b3}
.tag{font-size:12px;color:#666}
.btn{padding:10px 14px;background:#58cc02;color:#fff;border:none;border-radius:10px}
</style>
</head>

<body>

<header>📘 AI英语学习 V4（免费增强版）</header>

<div class="card">
<h3>📅 Day <span id="day"></span></h3>
<div class="tag" id="progress"></div>
</div>

<div class="card">
<h3>📚 今日学习</h3>
<div id="study"></div>
</div>

<div class="card">
<h3>🧠 今日练习</h3>
<div id="quiz"></div>
</div>

<div class="card">
<h3>🔁 复习区</h3>
<div id="review"></div>
</div>

<script>

/////////////////////////////////////////////////////
// 📅 Day系统
/////////////////////////////////////////////////////
let start = localStorage.getItem("startDay");
if(!start){
start = Date.now();
localStorage.setItem("startDay",start);
}

let day = Math.floor((Date.now()-start)/86400000)+1;
document.getElementById("day").innerText = day;

/////////////////////////////////////////////////////
// 🔊 语音
/////////////////////////////////////////////////////
function speak(t){
let u=new SpeechSynthesisUtterance(t);
u.lang="en-US";
speechSynthesis.cancel();
speechSynthesis.speak(u);
}

/////////////////////////////////////////////////////
// 🧠 分层词库（模拟1000词结构）
/////////////////////////////////////////////////////
const core=["want","like","go","eat","drink","have","need","take","give","make"];
const daily=["water","food","home","school","time","money","work","book","car","phone"];
const scene=["restaurant","airport","hotel","bus","train","coffee","order","menu","ticket","meeting"];

/////////////////////////////////////////////////////
// 💬 句型系统（核心500句基础）
/////////////////////////////////////////////////////
const templates=[
"I want ___",
"I like ___",
"I need ___",
"Can I have ___",
"Where is ___",
"I go to ___"
];

/////////////////////////////////////////////////////
// 🔁 每日稳定生成（不重复）
/////////////////////////////////////////////////////
function seed(i){
return Math.abs(Math.sin(day+i)*10000)%1;
}

function pick(arr,n,startSeed){
let res=[];
let used=new Set();

let i=0;
while(res.length<n){
let idx=Math.floor(seed(startSeed+i)*arr.length);
let w=arr[idx];
if(!used.has(w)){
used.add(w);
res.push(w);
}
i++;
}
return res;
}

/////////////////////////////////////////////////////
// 📚 今日单词（5个）
/////////////////////////////////////////////////////
let words=[
...pick(core,2,1),
...pick(daily,2,5),
...pick(scene,1,9)
];

/////////////////////////////////////////////////////
// 💬 今日句子（2个）
/////////////////////////////////////////////////////
let sentences=[];
for(let i=0;i<2;i++){
let tpl=templates[Math.floor(seed(i+20)*templates.length)];
let w=words[Math.floor(seed(i+30)*words.length)];
sentences.push(tpl.replace("___",w));
}

/////////////////////////////////////////////////////
// 📚 渲染学习
/////////////////////////////////////////////////////
let study=document.getElementById("study");

words.forEach(w=>{
let d=document.createElement("div");
d.className="item";
d.innerText="🔤 "+w;
d.onclick=()=>speak(w);
study.appendChild(d);
});

sentences.forEach(s=>{
let d=document.createElement("div");
d.className="item";
d.innerText="💬 "+s;
d.onclick=()=>speak(s);
study.appendChild(d);
});

/////////////////////////////////////////////////////
// 🧠 简单练习
/////////////////////////////////////////////////////
let quiz=[
{q:"I ___ water",a:"want",opts:["want","go","eat"]},
{q:"I ___ food",a:"like",opts:["like","run","sleep"]},
{q:"Where ___ you go?",a:"do",opts:["do","does","did"]}
];

let review=JSON.parse(localStorage.getItem("review")||"[]");

let qbox=document.getElementById("quiz");

quiz.concat(review.slice(-3)).forEach(q=>{
let d=document.createElement("div");
d.innerHTML="❓ "+q.q;

q.opts.forEach(o=>{
let b=document.createElement("div");
b.className="item";
b.innerText=o;

b.onclick=()=>{
if(o===q.a){
b.classList.add("good");
}else{
b.classList.add("bad");
review.push(q);
localStorage.setItem("review",JSON.stringify(review));
renderReview();
}
};
d.appendChild(b);
});

qbox.appendChild(d);
});

/////////////////////////////////////////////////////
// 🔁 复习系统
/////////////////////////////////////////////////////
function renderReview(){
let box=document.getElementById("review");
box.innerHTML="";
review.slice(-6).forEach(r=>{
let d=document.createElement("div");
d.className="item";
d.innerText="🔁 "+r.q;
box.appendChild(d);
});
}

renderReview();

</script>

</body>
</html>
