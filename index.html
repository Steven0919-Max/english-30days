<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>轻量英语V3</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
h2 { text-align:center; }
.card { background:#fff; margin:12px; padding:15px; border-radius:12px; }
.word { padding:6px 0; cursor:pointer; }
.small { color:#666; font-size:12px; text-align:center; }
button { padding:8px 12px; margin:5px; }
</style>
</head>

<body>

<h2>📘 AI英语学习V3</h2>

<div class="small" id="date"></div>

<div class="card">
<h3>📅 Day <span id="day">1</span></h3>
</div>

<div class="card">
<h3>🔊 单词（点击发音）</h3>
<div id="words"></div>
</div>

<div class="card">
<h3>🧠 句子</h3>
<div id="sentences"></div>
</div>

<div class="card">
<h3>📊 打卡</h3>
<button onclick="checkin()">今日打卡</button>
<p id="streak"></p>
</div>

<script>

// ===== 基础数据 =====
let words = [
"want = 想要",
"water = 水",
"food = 食物",
"go = 去",
"like = 喜欢"
];

let sentences = [
"I want water",
"I like food",
"Can I go?"
];

// ===== 日期 =====
document.getElementById("date").innerText = new Date().toDateString();

// ===== Day系统 =====
let start = localStorage.getItem("startDay");
if(!start){
 start = Date.now();
 localStorage.setItem("startDay", start);
}
let day = Math.floor((Date.now() - start)/(1000*60*60*24)) + 1;
document.getElementById("day").innerText = day;

// ===== 单词渲染 =====
function renderWords(){
 let box = document.getElementById("words");
 box.innerHTML = "";
 words.forEach(w=>{
   let div = document.createElement("div");
   div.className = "word";
   div.innerText = w;

   div.onclick = ()=>{
     let msg = new SpeechSynthesisUtterance(w.split("=")[0]);
     speechSynthesis.speak(msg);
   };

   box.appendChild(div);
 });
}
renderWords();

// ===== 句子 =====
function renderSentences(){
 let box = document.getElementById("sentences");
 box.innerHTML = "";
 sentences.forEach(s=>{
   let div = document.createElement("div");
   div.className = "word";
   div.innerText = s;

   div.onclick = ()=>{
     let msg = new SpeechSynthesisUtterance(s);
     speechSynthesis.speak(msg);
   };

   box.appendChild(div);
 });
}
renderSentences();

// ===== 打卡系统 =====
function checkin(){
 let today = new Date().toDateString();
 let last = localStorage.getItem("last");

 if(last === today){
   alert("今天已打卡");
   return;
 }

 let streak = parseInt(localStorage.getItem("streak") || "0") + 1;

 localStorage.setItem("streak", streak);
 localStorage.setItem("last", today);

 document.getElementById("streak").innerText =
 "连续学习：" + streak + " 天";
}

document.getElementById("streak").innerText =
"连续学习：" + (localStorage.getItem("streak") || 0) + " 天";

</script>

</body>
</html>
